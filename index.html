<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Password Strength Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Password Strength Analyzer</h2>

    <div class="field">
        <input type="password" id="password" placeholder="Enter password">
        <button id="toggle">Show</button>
    </div>

    <div id="meter" aria-hidden="true"><div class="bar"></div></div>
    <div id="strength" aria-live="polite"></div>

    <button id="check">Check Strength</button>
    <p class="hint">Suggestions: use 12+ chars, mix upper/lower, numbers and symbols.</p>
</div>

<script src="script.js"></script>
</body>
</html>
